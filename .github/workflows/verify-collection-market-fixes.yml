name: Verify Collection Market Fixes

on:
  push:
    branches:
      - verify/collection-market-fixes
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  verify-and-commit:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: verify/collection-market-fixes
          fetch-depth: 0
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Apply targeted fixes
        run: node scripts/apply-collection-market-fixes.mjs
      - name: Install dependencies
        run: npm ci
      - name: Type check
        id: typecheck
        continue-on-error: true
        run: npm run check 2>&1 | tee typecheck.log
      - name: Upload typecheck log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: collection-fixes-typecheck
          path: typecheck.log
      - name: Stop on typecheck failure
        if: steps.typecheck.outcome == 'failure'
        run: exit 1
      - name: Build
        run: npm run build
      - name: Commit verified product changes
        run: |
          rm scripts/apply-collection-market-fixes.mjs
          rm .github/workflows/verify-collection-market-fixes.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Fix Arena sale values, vault entries and collection actions"
          git push origin HEAD:verify/collection-market-fixes
