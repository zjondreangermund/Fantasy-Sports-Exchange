name: Verify Collection Market Fixes

on:
  push:
    branches:
      - verify/collection-market-fixes

permissions:
  contents: write

jobs:
  verify-and-commit:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: verify/collection-market-fixes
          fetch-depth: 0
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Apply targeted fixes
        run: node scripts/apply-collection-market-fixes.mjs
      - name: Install dependencies
        run: npm ci
      - name: Type check
        run: npm run check
      - name: Build
        run: npm run build
      - name: Commit verified product changes
        run: |
          rm scripts/apply-collection-market-fixes.mjs
          rm .github/workflows/verify-collection-market-fixes.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Fix Arena sale values, vault entries and collection actions"
          git push origin HEAD:verify/collection-market-fixes
