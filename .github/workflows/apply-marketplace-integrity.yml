name: Apply marketplace integrity repair

on:
  push:
    branches:
      - agent/admin-integrity-endpoints

permissions:
  contents: write

jobs:
  apply:
    if: ${{ !contains(github.event.head_commit.message, '[skip-marketplace-fix]') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/admin-integrity-endpoints
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - run: node scripts/apply-marketplace-integrity-fix.mjs
      - run: |
          if git diff --quiet; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add server/routes/marketplace.routes.ts
          git commit -m "Apply marketplace ledger integrity [skip-marketplace-fix]"
          git push origin HEAD:agent/admin-integrity-endpoints
