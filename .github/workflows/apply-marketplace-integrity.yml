name: Apply marketplace integrity repair

on:
  push:
    branches:
      - agent/marketplace-ledger-integrity

permissions:
  contents: write

jobs:
  apply:
    if: ${{ !contains(github.event.head_commit.message, '[skip-marketplace-fix]') }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repair branch
        uses: actions/checkout@v4
        with:
          ref: agent/marketplace-ledger-integrity
          fetch-depth: 0
      - name: Apply repair
        run: node scripts/apply-marketplace-integrity-fix.mjs
      - name: Commit source repair
        run: |
          if git diff --quiet; then
            echo "No source changes required."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add server/routes/marketplace.routes.ts
          git commit -m "Use shared ledger for marketplace transfers [skip-marketplace-fix]"
          git push origin HEAD:agent/marketplace-ledger-integrity
