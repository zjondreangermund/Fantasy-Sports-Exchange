name: Apply live point feed registration

on:
  push:
    branches:
      - agent/real-stats-salvage

permissions:
  contents: write

jobs:
  apply:
    if: ${{ !contains(github.event.head_commit.message, '[skip-live-feed-register]') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/real-stats-salvage
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: node scripts/register-live-point-feed.mjs
      - run: |
          if git diff --quiet; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add server/routes.ts
          git commit -m "Register real live point feed route [skip-live-feed-register]"
          git push origin HEAD:agent/real-stats-salvage
