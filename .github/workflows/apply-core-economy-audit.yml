name: Apply core economy audit

on:
  push:
    branches:
      - agent/core-economy-audit

permissions:
  contents: write

jobs:
  apply-and-validate:
    if: ${{ !contains(github.event.head_commit.message, '[skip-core-economy-audit]') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/core-economy-audit
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: node scripts/apply-core-economy-audit.mjs
      - run: npm run check
      - run: npm run build:client
      - run: npm run build:server
      - run: npm run test:critical-flows
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add server/routes.ts server/services/walletLedger.ts
          git commit -m "Fix atomic tournament entry and settlement logic [skip-core-economy-audit]"
          git push origin HEAD:agent/core-economy-audit
