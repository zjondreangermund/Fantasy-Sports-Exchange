name: Production audit validation

on:
  pull_request:
    branches: [main]
  push:
    branches:
      - main
      - agent/production-audit-repair

permissions:
  contents: write

concurrency:
  group: production-audit-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: TypeScript, builds and critical flows
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}
          fetch-depth: 0

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Apply audit TypeScript repairs
        if: github.head_ref == 'agent/typescript-ci-diagnostics'
        run: |
          node scripts/fix-typescript-errors.mjs
          if git diff --quiet; then
            echo "No TypeScript source repairs required."
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add client/src server/routes
            git commit -m "Fix remaining TypeScript errors [skip-autofix]"
            git push origin HEAD:${{ github.head_ref }}
          fi

      - name: Apply production auth hardening
        if: github.head_ref == 'agent/auth-production-hardening'
        run: |
          node scripts/apply-auth-production-hardening.mjs
          if git diff --quiet; then
            echo "Production auth hardening already applied."
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add .env.example README.md server scripts
            git commit -m "Harden production authentication and API logging [skip-autofix]"
            git push origin HEAD:${{ github.head_ref }}
          fi

      - name: Apply card data integrity repairs
        if: github.head_ref == 'agent/card-data-integrity-audit'
        run: |
          node scripts/apply-card-data-integrity.mjs
          if git diff --quiet; then
            echo "Card data integrity repairs already applied."
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add client/public client/src server scripts
            git commit -m "Repair card teams, positions and official stats [skip-autofix]"
            git push origin HEAD:${{ github.head_ref }}
          fi

      - name: Install locked dependencies
        run: npm ci

      - name: Full TypeScript check
        id: typescript
        shell: bash
        run: |
          set +e
          npm run check 2>&1 | tee typescript-errors.log
          status=${PIPESTATUS[0]}
          echo "exit_code=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload TypeScript diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: typescript-diagnostics
          path: typescript-errors.log
          if-no-files-found: error
          retention-days: 7

      - name: Fail on TypeScript errors
        if: steps.typescript.outputs.exit_code != '0'
        run: exit 1

      - name: Build client
        run: npm run build:client

      - name: Build server
        run: npm run build:server

      - name: Verify critical flows
        id: critical
        shell: bash
        run: |
          set +e
          {
            npm run test:critical-flows &&
            node --check scripts/prepare-runtime-startup.mjs &&
            node --check scripts/sync-official-tournaments.mjs &&
            node scripts/verify-runtime-boot-recovery.mjs &&
            node scripts/verify-tournament-lineup-integrity.mjs &&
            node scripts/verify-tournament-scoring-legal-integrity.mjs &&
            node scripts/verify-route-ownership-integrity.mjs &&
            node scripts/verify-auth-production-integrity.mjs &&
            node scripts/verify-card-data-integrity.mjs &&
            node scripts/verify-unified-scroll-architecture.mjs &&
            node scripts/verify-deposit-flows.mjs &&
            node scripts/verify-withdrawal-flows.mjs &&
            node scripts/verify-wallet-reconciliation.mjs &&
            node scripts/verify-wallet-bypass-removal.mjs &&
            node scripts/verify-wallet-posting-integrity.mjs &&
            node scripts/verify-loan-payment-integrity.mjs &&
            node scripts/verify-forge-operation-integrity.mjs &&
            node scripts/verify-production-readiness.mjs
          } 2>&1 | tee critical-flow-errors.log
          status=${PIPESTATUS[0]}
          echo "exit_code=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload critical-flow diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: critical-flow-diagnostics
          path: critical-flow-errors.log
          if-no-files-found: error
          retention-days: 7

      - name: Fail on critical-flow errors
        if: steps.critical.outputs.exit_code != '0'
        run: exit 1
