name: Verify Rare Prize Images

on:
  push:
    branches:
      - feature/rare-prize-images
  pull_request:
    branches:
      - main

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Type check
        id: typecheck
        continue-on-error: true
        run: npm run check 2>&1 | tee typecheck.log
      - name: Upload typecheck log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rare-prize-typecheck
          path: typecheck.log
      - name: Stop on typecheck failure
        if: steps.typecheck.outcome == 'failure'
        run: exit 1
      - run: npm run build
