name: Apply TypeScript audit fixes

on:
  push:
    branches:
      - agent/typescript-ci-diagnostics

permissions:
  contents: write

jobs:
  apply:
    if: ${{ !contains(github.event.head_commit.message, '[skip-autofix]') }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout audit branch
        uses: actions/checkout@v4
        with:
          ref: agent/typescript-ci-diagnostics
          fetch-depth: 0

      - name: Use Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Apply focused repairs
        run: node scripts/fix-typescript-errors.mjs

      - name: Commit repaired sources
        run: |
          if git diff --quiet; then
            echo "No source changes required."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add client/src server/routes
          git commit -m "Fix remaining TypeScript errors [skip-autofix]"
          git push origin HEAD:agent/typescript-ci-diagnostics
