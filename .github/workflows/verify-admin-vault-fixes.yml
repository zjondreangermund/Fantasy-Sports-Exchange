name: Verify Admin Tournament and Vault Fixes

on:
  push:
    branches:
      - fix/admin-tournaments-and-vault

permissions:
  contents: write

jobs:
  apply-and-verify:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: fix/admin-tournaments-and-vault
          fetch-depth: 0
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Apply fixes
        run: node scripts/apply-admin-vault-fixes.mjs
      - name: Persist product changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add client/src/components/admin/AdminTournamentManager.tsx client/src/pages/competitions-vault.tsx server/routes/admin.routes.ts server/routes/prizeVault.routes.ts
          git commit -m "Apply admin tournament, live stats and vault fixes"
          git push origin HEAD:fix/admin-tournaments-and-vault
      - name: Install dependencies
        run: npm ci
      - name: Type check
        run: npm run check
      - name: Build
        run: npm run build
