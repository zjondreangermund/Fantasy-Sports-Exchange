name: Verify Admin Tournament and Vault Fixes

on:
  push:
    branches:
      - fix/admin-tournaments-and-vault

permissions:
  contents: write

jobs:
  verify-and-commit:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: fix/admin-tournaments-and-vault
          fetch-depth: 0
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Apply fixes
        run: node scripts/apply-admin-vault-fixes.mjs
      - name: Install dependencies
        run: npm ci
      - name: Type check
        run: npm run check
      - name: Build
        run: npm run build
      - name: Commit verified changes
        run: |
          rm scripts/apply-admin-vault-fixes.mjs
          rm .github/workflows/verify-admin-vault-fixes.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Fix admin tournament controls, live stats and vault entries"
          git push origin HEAD:fix/admin-tournaments-and-vault
