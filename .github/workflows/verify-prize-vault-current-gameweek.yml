name: Verify Prize Vault Current Gameweek

on:
  push:
    branches:
      - fix/prize-vault-current-gameweek
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Type check
        shell: bash
        run: |
          npm run check > /tmp/typecheck.log 2>&1 || {
            echo "--- TYPECHECK ERRORS ---"
            tail -n 120 /tmp/typecheck.log
            exit 1
          }
          cat /tmp/typecheck.log
      - name: Build
        run: npm run build
