name: Verify Prize Vault Current Gameweek

on:
  push:
    branches:
      - fix/prize-vault-current-gameweek
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: fix/prize-vault-current-gameweek
          fetch-depth: 0
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Repair inherited Admin JSX
        run: node scripts/fix-admin-tournament-jsx.mjs
      - name: Install dependencies
        run: npm ci
      - name: Type check
        run: npm run check
      - name: Build
        run: npm run build
      - name: Commit verified product changes
        run: |
          rm scripts/fix-admin-tournament-jsx.mjs
          rm .github/workflows/verify-prize-vault-current-gameweek.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Link Prize Vault to current gameweek entries"
          git push origin HEAD:fix/prize-vault-current-gameweek
