name: Verify Prize Vault Current Gameweek

on:
  push:
    branches:
      - fix/prize-vault-current-gameweek
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Type check
        id: typecheck
        continue-on-error: true
        shell: bash
        run: npm run check > typecheck.log 2>&1
      - name: Upload typecheck diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: prize-vault-typecheck
          path: typecheck.log
      - name: Stop on typecheck failure
        if: steps.typecheck.outcome == 'failure'
        run: |
          cat typecheck.log
          exit 1
      - name: Build
        run: npm run build
