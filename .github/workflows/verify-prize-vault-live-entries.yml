name: Verify Prize Vault Live Entries

on:
  push:
    branches:
      - fix/prize-vault-live-entries
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Type check
        id: typecheck
        continue-on-error: true
        run: npm run check > typecheck.log 2>&1
      - name: Upload typecheck log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: prize-vault-typecheck
          path: typecheck.log
      - name: Stop on typecheck failure
        if: steps.typecheck.outcome == 'failure'
        run: exit 1
      - run: npm run build
