name: Verify Prize Vault Live Entries

on:
  push:
    branches:
      - fix/prize-vault-live-entries
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/prize-vault-live-entries
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Remove malformed admin tournament fragment
        run: |
          node <<'NODE'
          const fs = require('fs');
          const path = 'client/src/components/admin/AdminTournamentManager.tsx';
          let text = fs.readFileSync(path, 'utf8');
          const marker = '</div><div className="mt-1 text-white/50">GW {comp.gameWeek}';
          const start = text.indexOf(marker);
          if (start >= 0) {
            const endMarker = 'No tournaments found.</div>}</div>';
            const end = text.indexOf(endMarker, start);
            if (end < 0) throw new Error('Could not locate end of malformed tournament fragment');
            text = text.slice(0, start + 6) + text.slice(end + endMarker.length);
            fs.writeFileSync(path, text);
          }
          NODE
      - run: npm ci
      - name: Type check
        id: typecheck
        continue-on-error: true
        run: npm run check > typecheck.log 2>&1
      - name: Upload typecheck log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: prize-vault-typecheck-remaining
          path: typecheck.log
      - name: Stop on typecheck failure
        if: steps.typecheck.outcome == 'failure'
        run: exit 1
      - run: npm run build
      - name: Commit verified fixes
        if: github.event_name == 'push'
        run: |
          rm .github/workflows/verify-prize-vault-live-entries.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Link Prize Vault entries to latest rarity gameweek"
          git push origin HEAD:fix/prize-vault-live-entries
