name: Verify Rare Prize Artwork

on:
  push:
    branches:
      - verify/rare-prize-artwork
  pull_request:
    branches:
      - main

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Type check
        id: typecheck
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          npm run check 2>&1 | tee typecheck.log
      - name: Build
        id: build
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          npm run build 2>&1 | tee build.log
      - name: Upload verification logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rare-artwork-verification-logs
          path: |
            typecheck.log
            build.log
      - name: Fail when verification failed
        if: steps.typecheck.outcome != 'success' || steps.build.outcome != 'success'
        run: exit 1
