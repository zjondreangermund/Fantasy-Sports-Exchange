[phases.setup]
nixpkgsArchive = "3e2cf88148e732abc1d259286123e06a9d8c964a"
nixPkgs = ["nodejs_20", "npm-10_x"]

[variables]
NPM_CONFIG_CACHE = "/root/.npm"
NPM_CONFIG_PRODUCTION = "false"
NPM_CONFIG_INCLUDE = "dev"

[phases.install]
cmds = ["npm ci --include=dev"]

[phases.build]
cmds = ["npm run build"]

[start]
cmd = "bash start.sh"
